global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # --- Telemt proxy nodes (MTProto) ---
  - job_name: "telemt"
    static_configs:
      - targets: ["109.120.151.102:9090"]
        labels:
          node: "node-2"
          location: "helsinki"

  # --- mtproxy services (central server) ---
  - job_name: "allocator"
    static_configs:
      - targets: ["65.21.119.62:9200"]

  - job_name: "payment"
    static_configs:
      - targets: ["65.21.119.62:9201"]

  # --- System metrics (node_exporter) ---
  - job_name: "node"
    static_configs:
      - targets: ["65.21.119.62:9100"]
        labels:
          server: "central"
      - targets: ["109.120.151.102:9100"]
        labels:
          server: "node-2"
